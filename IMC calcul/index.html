<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon IMC..com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2> Calculateur IMC</h2>
        
        <label>Votre poids (kg)</label>
        <input type="number" id="poids" placeholder="Ex: 70" step="0.1">
        
        <label> Votre taille (cm)</label>
        <input type="number" id="taille" placeholder="Ex: 175" step="0.1">
        
        <button onclick="getConseils()">Obtenir mon analyse</button>
        
        <div id="resultat" class="resultat">
            <div class="imc-valeur" id="imcValeur"></div>
            <div class="imc-categorie" id="imcCategorie"></div>
            <div class="conseils" id="conseilsTexte"></div>
        </div>
        
        <div class="note">
            Stephane Kassi N'guessan - 2026
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
